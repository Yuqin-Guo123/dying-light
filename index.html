<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zombie Project</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    .page {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .page.active {
      display: block;
    }

    #page1 video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .next-after-video {
      display: none;
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 52px;
      color: white;
      cursor: pointer;
      z-index: 10;
      text-shadow: 0 0 20px black;
      opacity: 0.8;
      transition: 0.2s;
      user-select: none;
    }

    .next-after-video.show {
      display: block;
    }

    .next-after-video:hover {
      transform: translateY(-50%) scale(1.1);
      opacity: 1;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 48px;
      cursor: pointer;
      z-index: 50;
      color: white;
      text-shadow: 0 0 15px black;
      user-select: none;
      opacity: 0.75;
      transition: 0.2s;
    }

    .arrow:hover {
      transform: translateY(-50%) scale(1.12);
      opacity: 1;
    }

    .arrow.left {
      left: 18px;
    }

    .arrow.right {
      right: 18px;
    }

    #page2 {
      background: url("assets/week_background.png") center/cover no-repeat;
    }

    .icon-button {
      position: absolute;
      cursor: pointer;
      z-index: 20;
      transition: 0.2s;
    }

    .icon-button:hover {
      transform: scale(1.04);
      filter: brightness(1.2);
    }

    #newGameBtn {
  left: 4.5%;
  top: 42%;
  width: 29%;
  height: 16%;
  object-fit: contain;
}

#legendBtn {
  left: 35.5%;
  top: 42%;
  width: 29%;
  height: 16%;
  object-fit: contain;
}

#nightmareBtn {
  right: 4.5%;
  top: 42%;
  width: 29%;
  height: 16%;
  object-fit: contain;
}

    .preview-box {
      display: none;
      position: absolute;
      z-index: 35;
      background: rgba(0, 0, 0, 0.65);
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.8);
      overflow: hidden;
    }

    .preview-box.show {
      display: block;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .close-preview {
      position: absolute;
      top: 8px;
      right: 12px;
      z-index: 40;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      color: white;
      text-shadow: 0 0 8px black;
    }

    #page3 {
     background: url("assets/restored_land.png") center/cover no-repeat;
  background-color: #000;
    }

    .music-toggle {
      position: absolute;
      right: 35px;
      bottom: 30px;
      width: 70px;
      height: 70px;
      z-index: 100;
      cursor: pointer;
      transition: 0.2s;
    }

    .music-toggle:hover {
      transform: scale(1.08);
    }

    .music-toggle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>

<body>

  <section id="page1" class="page active">
    <video id="introVideo" autoplay muted playsinline>
      <source src="assets/intro.mp4" type="video/mp4" />
    </video>

    <div id="goPage2" class="next-after-video">&gt;</div>

    <div class="music-toggle" onclick="toggleMusic()">
      <img src="assets/music_icon.png" alt="music" />
    </div>
  </section>

  <section id="page2" class="page">
    <div class="arrow left" onclick="goToPage(1)">&lt;</div>
    <div class="arrow right" onclick="goToPage(3)">&gt;</div>

    <img
      id="newGameBtn"
      class="icon-button"
      src="assets/New_Game_icon.png"
      onclick="showPreview('assets/KeyVisual.jpg', 'newGameBtn')"
      alt="New Game"
    />

    <img
      id="legendBtn"
      class="icon-button"
      src="assets/legend_icon.png"
      onclick="showPreview('assets/ss_b952654580eb391536d075fe82af5bbd3c9412ec.1920x1080.jpg', 'legendBtn')"
      alt="Legend Levels"
    />

    <img
      id="nightmareBtn"
      class="icon-button"
      src="assets/nightmare_icon.png"
      onclick="showPreview('assets/dying-light-the-beast-game-rant-advance-zombies-chimeras-1.avif', 'nightmareBtn')"
      alt="Nightmare Difficulty"
    />

    <div id="previewBox" class="preview-box">
      <div class="close-preview" onclick="closePreview()">×</div>
      <img id="previewImage" src="" alt="preview" />
    </div>
  </section>

  <section id="page3" class="page">
    <div class="arrow left" onclick="goToPage(2)">&lt;</div>
  </section>

  <script>
    const pages = document.querySelectorAll(".page");
    const introVideo = document.getElementById("introVideo");
    const goPage2 = document.getElementById("goPage2");
    const previewBox = document.getElementById("previewBox");
    const previewImage = document.getElementById("previewImage");

    setTimeout(() => {
      goPage2.classList.add("show");
    }, 10000);

    goPage2.addEventListener("click", () => {
      goToPage(2);
    });

    function goToPage(pageNumber) {
      pages.forEach(page => page.classList.remove("active"));
      document.getElementById("page" + pageNumber).classList.add("active");
      closePreview();

      if (pageNumber === 1) {
        introVideo.play();
      } else {
        introVideo.pause();
        introVideo.muted = true;
      }
    }

    function showPreview(imagePath, targetId) {
      const target = document.getElementById(targetId);
      const targetRect = target.getBoundingClientRect();
      const pageRect = document.getElementById("page2").getBoundingClientRect();

      previewImage.src = imagePath;

      previewBox.style.left = targetRect.left - pageRect.left + "px";
      previewBox.style.top = targetRect.top - pageRect.top - 18 + "px";
      previewBox.style.width = targetRect.width + "px";
      previewBox.style.height = targetRect.height + "px";

      previewBox.classList.add("show");
    }

    function closePreview() {
      previewBox.classList.remove("show");
      previewImage.src = "";
    }

    function toggleMusic() {
      introVideo.muted = !introVideo.muted;
    }
  </script>

</body>
</html>
